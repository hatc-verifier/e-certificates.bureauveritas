<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-container">
        <div id="search-section" class="main-content">
            <div class="glass-card">
                <h2>Please search your e-document by filling the document number.</h2>
                <div class="search-form">
                    <div class="input-label">Document number</div>
                    <input type="text" id="cert-id" placeholder="e.g. 148-2026...">
                    <button class="search-btn" onclick="performSearch()">🔍</button>
                </div>
            </div>
        </div>

        <div id="result-section" class="main-content hidden">
            <div class="glass-card result-card">
                <div class="success-icon">✔️</div>
                <div id="data-list" class="data-table">
                    </div>
                <p class="disclaimer">For any further information on this document, please contact the issuer of the document.</p>
            </div>
        </div>

        <footer class="footer-bottom">
            <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas Website</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

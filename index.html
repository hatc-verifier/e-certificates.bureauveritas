<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certificate Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="full-bg">
        <div id="search-view" class="container">
            <div class="card">
                <h3>Please search your e-document by filling the document number.</h3>
                <div class="search-wrapper">
                    <div class="label-box">Document number</div>
                    <input type="text" id="cert-input" placeholder="148-2026-022489-EN">
                    <button id="search-btn" onclick="searchData()">🔍</button>
                </div>
            </div>
        </div>

        <div id="result-view" class="container hidden">
            <div class="card result-card">
                <div class="tick-icon">✔️</div>
                <div id="display-data"></div>
                <p class="small-text">For any further information on this document, please contact the issuer of the document.</p>
            </div>
        </div>

        <footer class="footer-fixed">
            <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas Website</a>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>

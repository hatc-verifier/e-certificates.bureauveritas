<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Authentication</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="main-wrapper">
        <header>
            <div class="header-content">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Bureau_Veritas_Logo.png" alt="Logo">
                <p>Authenticate <span>your document</span></p>
            </div>
        </header>

        <section id="home-page" class="content-box">
            <div class="search-container">
                <h3>Please search your e-document by filling the document number.</h3>
                <div class="input-group">
                    <span class="label">Document number</span>
                    <input type="text" id="cert-input" placeholder="e.g. 148-2026...">
                    <button onclick="handleSearch()">🔍</button>
                </div>
            </div>
        </section>

        <section id="result-page" class="content-box hidden">
            <div class="success-icon">✔️</div>
            <div id="result-display" class="info-table">
                </div>
            <p class="footer-note">For any further information on this document, please contact the issuer of the document.</p>
        </section>

        <footer>
            <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas Website</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

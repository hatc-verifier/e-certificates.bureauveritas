<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-wrapper">
        
        <div id="search-page" class="center-content">
            <div class="search-box">
                <p>Please search your e-document by filling the document number.</p>
                <div class="input-group">
                    <span class="label">Document number</span>
                    <input type="text" id="cert-number" placeholder="e.g. 148-2026...">
                    <button onclick="showResult()">🔍</button>
                </div>
                <div class="footer-link">
                    <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas Website</a>
                </div>
            </div>
        </div>

        <div id="result-page" class="center-content hidden">
            <div class="result-card">
                <div class="success-mark">✔️</div>
                <div id="data-output">
                    </div>
                <p class="notice">For any further information on this document, please contact the issuer of the document.</p>
                <div class="footer-link">
                    <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas Website</a>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

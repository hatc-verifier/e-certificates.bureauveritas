<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certificate Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <main id="search-page" class="view">
            <div class="white-card">
                <h3>Please search your e-document by filling the document number.</h3>
                <div class="search-box">
                    <div class="input-tag">Document number</div>
                    <input type="text" id="cert-id" placeholder="148-2026-022489-EN">
                    <button class="blue-search-btn" onclick="goToResult()">
                        <span class="search-icon">🔍</span>
                    </button>
                </div>
            </div>
        </main>

        <main id="result-page" class="view hidden">
            <div class="white-card result-card">
                <div class="green-tick">✔️</div>
                <div id="result-content" class="scrollable-data">
                    </div>
                <p class="bottom-note">For any further information on this document, please contact the issuer of the document.</p>
            </div>
        </main>

        <footer class="fixed-footer">
            <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas Website</a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Certificate Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <div id="search-view" class="content-view">
            <div class="white-card">
                <h3>Please search your e-document by filling the document number.</h3>
                <div class="custom-search-bar">
                    <div class="side-label">Document number</div>
                    <input type="text" id="cert-id" placeholder="148-2026-022489-EN">
                    <button class="blue-btn" onclick="searchData()">🔍</button>
                </div>
            </div>
        </div>

        <div id="result-view" class="content-view hidden">
            <div class="white-card result-box">
                <div class="status-tick">✔️</div>
                <div id="data-container"></div>
                <p class="footer-note">For any further information on this document, please contact the issuer of the document.</p>
            </div>
        </div>

        <div class="bottom-footer">
            <a href="https://group.bureauveritas.com/" target="_blank">Visit Bureau Veritas Website</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
